# DevForge Starship Configuration

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "bold cyan"
truncate_to_repo = true
read_only = " 🔒"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[git_branch]
symbol = "🌱 "
style = "bold purple"

[git_status]
style = "bold red"

[cmd_duration]
min_time = 500
style = "bold yellow"

[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style) "
disabled = false

[hostname]
ssh_only = true
format = "on [$hostname](bold yellow) "
disabled = false
